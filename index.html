<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Zenith Rise Logging</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: #0f172a;
  color: white;
  text-align: center;
}

h1 {
  margin-top: 40px;
}

.container {
  display: flex;
  justify-content: center;
  gap: 20px;
  margin-top: 30px;
}

.column {
  width: 40%;
  background: #1e293b;
  padding: 10px;
  border-radius: 12px;
}

.user {
  padding: 12px;
  margin: 6px;
  border-radius: 10px;
  cursor: pointer;
  transition: 0.2s;
}

.online {
  background: #22c55e;
}

.offline {
  background: #374151;
}

.user:hover {
  transform: scale(1.05);
}
</style>
</head>

<body>

<h1>🔥 Zenith Rise Logging</h1>

<select id="group">
  <option value="Trainer">Trainer</option>
  <option value="Gym_Leader">Gym Leader</option>
  <option value="Elite_Four">Elite Four</option>
</select>

<div class="container">
  <div class="column">
    <h3>🔴 Offline</h3>
    <div id="offline"></div>
  </div>

  <div class="column">
    <h3>🟢 Online</h3>
    <div id="online"></div>
  </div>
</div>

<p id="msg"></p>

<script>

let users = {
  "Ash": { main: "1111111111111111", sec: null },
  "Misty": { main: "2222222222222222", sec: null },
  "Brock": { main: "3333333333333333", sec: null }
}

let onlineIDs = []

async function loadOnline() {
  const group = document.getElementById("group").value

  const res = await fetch(`https://api.github.com/gists/${
    group === "Trainer" ? "4edcf4d341cd4f7d5d0fb8a50f8b8c3c" :
    group === "Gym_Leader" ? "e110c37b3e0b8de83a33a1b0a5eb64e8" :
    "d9db3a72fed74c496fd6cc830f9ca6e9"
  }`)

  const data = await res.json()

  const content = Object.values(data.files)[0].content

  onlineIDs = content.split("\n").filter(x=>x)

  render()
}

function render() {

  offline.innerHTML = ""
  online.innerHTML = ""

  for (let name in users) {

    const user = users[name]

    const isOnline = onlineIDs.includes(user.main)

    const div = document.createElement("div")
    div.className = "user " + (isOnline ? "online" : "offline")
    div.innerText = name

    div.onclick = () => toggle(user)

    if (isOnline) online.appendChild(div)
    else offline.appendChild(div)
  }
}

async function toggle(user) {

  const group = document.getElementById("group").value

  const isOnline = onlineIDs.includes(user.main)

  const action = isOnline ? "offline" : "online"

  const res = await fetch("/.netlify/functions/update", {
    method: "POST",
    body: JSON.stringify({
      action,
      id: user.main,
      group
    })
  })

  const txt = await res.text()
  msg.innerText = txt

  await loadOnline()
}

loadOnline()

</script>

</body>
</html>

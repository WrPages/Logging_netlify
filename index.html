<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Reroll Panel PRO</title>

<style>
body {
  font-family: Arial;
  background: #0f172a;
  color: white;
  text-align: center;
  padding: 30px;
}

.box {
  background: #1e293b;
  padding: 20px;
  border-radius: 12px;
  margin: 20px auto;
  max-width: 500px;
}

input, select, button {
  margin: 8px;
  padding: 10px;
  border-radius: 8px;
  border: none;
}

button {
  cursor: pointer;
  background: #3b82f6;
  color: white;
}

button:hover { background: #2563eb; }

.success { background: #22c55e; }
.danger { background: #ef4444; }

#output {
  margin-top: 20px;
  white-space: pre-line;
}
</style>
</head>

<body>

<h1>🔥 Reroll Control Panel</h1>

<div class="box">
  <h3>Grupo</h3>
  <select id="group">
    <option value="Trainer">Trainer</option>
    <option value="Gym_Leader">Gym Leader</option>
    <option value="Elite_Four">Elite Four</option>
  </select>
</div>

<div class="box">
  <h3>Main ID</h3>
  <input id="mainId" placeholder="16 digit ID">
  <br>
  <button onclick="register()">Register</button>
  <button onclick="changeId()">Change ID</button>
  <br>
  <button class="success" onclick="online()">🟢 Online</button>
  <button class="danger" onclick="offline()">🔴 Offline</button>
</div>

<div class="box">
  <h3>Secondary ID</h3>
  <input id="secId" placeholder="16 digit ID">
  <br>
  <button onclick="addSec()">Add Secondary</button>
  <button onclick="onlineSec()">Online Sec</button>
</div>

<div class="box">
  <h3>VIP (GP)</h3>
  <input id="vipId" placeholder="16 digit ID">
  <br>
  <button onclick="addVIP()">⭐ Add VIP</button>
</div>

<div class="box">
  <h3>Scheduler</h3>
  <input id="onH" placeholder="Online Hour UTC">
  <input id="onM" placeholder="Min">
  <br>
  <input id="offH" placeholder="Offline Hour UTC">
  <input id="offM" placeholder="Min">
  <br>
  <button onclick="schedule()">Start Schedule</button>
  <button class="danger" onclick="stopSchedule()">Stop</button>
</div>

<div class="box">
  <h3>Listas</h3>
  <button onclick="list()">📋 Users</button>
  <button onclick="onlineList()">🟢 Online List</button>
</div>

<div id="output"></div>

<script>

const API = "https://add-ids.netlify.app/.netlify/functions/api"

const GISTS = {
  Trainer: {
    users: "1c066922bc39ac136b6f234fad6d9420",
    ids: "4edcf4d341cd4f7d5d0fb8a50f8b8c3c",
    fileUsers: "trainer_users.json",
    fileIds: "trainer_ids.txt"
  },
  Gym_Leader: {
    users: "a3f5f3d8a2e6ddf2378fb3481dff49f6",
    ids: "e110c37b3e0b8de83a33a1b0a5eb64e8",
    fileUsers: "gym_users.json",
    fileIds: "gym_ids.txt"
  },
  Elite_Four: {
    users: "bb18eda2ea748723d8fe0131dd740b70",
    ids: "d9db3a72fed74c496fd6cc830f9ca6e9",
    fileUsers: "elite_users.json",
    fileIds: "elite_ids.txt"
  }
}

function g() { return document.getElementById("group").value }
function show(t) { document.getElementById("output").innerText = t }

function valid(id){ return /^\d{16}$/.test(id) }

// ================= API ACTIONS =================

async function online(){
  let id = mainId.value
  if(!valid(id)) return show("ID inválido")
  await fetch(`${API}?action=online&id=${id}&group=${g()}`)
  show("🟢 ONLINE enviado")
}

async function offline(){
  let id = mainId.value
  if(!valid(id)) return show("ID inválido")
  await fetch(`${API}?action=offline&id=${id}&group=${g()}`)
  show("🔴 OFFLINE enviado")
}

async function onlineSec(){
  let id = secId.value
  if(!valid(id)) return show("ID inválido")
  await fetch(`${API}?action=online&id=${id}&group=${g()}`)
  show("🟢 SEC ONLINE")
}

// ================= USERS =================

async function register(){
  let id = mainId.value
  if(!valid(id)) return show("ID inválido")

  await fetch(`${API}?action=register&id=${id}&group=${g()}`)
  show("✅ Registrado")
}

async function addSec(){
  let id = secId.value
  if(!valid(id)) return show("ID inválido")

  await fetch(`${API}?action=add_sec&id=${id}&group=${g()}`)
  show("✅ Sec añadido")
}

async function changeId(){
  let id = mainId.value
  if(!valid(id)) return show("ID inválido")

  await fetch(`${API}?action=change&id=${id}&group=${g()}`)
  show("🔄 ID cambiado")
}

// ================= VIP =================

async function addVIP(){
  let id = vipId.value
  if(!valid(id)) return show("ID inválido")

  await fetch(`${API}?action=vip&id=${id}&group=${g()}`)
  show("⭐ VIP enviado")
}

// ================= LIST =================

async function list(){
  const cfg = GISTS[g()]
  const res = await fetch(`https://api.github.com/gists/${cfg.users}`)
  const data = await res.json()

  const users = JSON.parse(data.files[cfg.fileUsers].content)

  let out = "📋 USERS:\n\n"
  for(let u in users){
    out += users[u].name + " → " + users[u].main_id + "\n"
  }

  show(out)
}

// ================= ONLINE LIST =================

async function onlineList(){
  const cfg = GISTS[g()]

  const res1 = await fetch(`https://api.github.com/gists/${cfg.ids}`)
  const idsTxt = (await res1.json()).files[cfg.fileIds].content

  const res2 = await fetch(`https://api.github.com/gists/${cfg.users}`)
  const users = JSON.parse((await res2.json()).files[cfg.fileUsers].content)

  const ids = idsTxt.split("\n").filter(x=>x)

  let out = "🟢 ONLINE:\n\n"

  for(let u in users){
    if(ids.includes(users[u].main_id) || ids.includes(users[u].sec_id)){
      out += users[u].name + "\n"
    }
  }

  show(out)
}

// ================= SCHEDULER =================

async function schedule(){
  let onH = onH.value
  let onM = onM.value
  let offH = offH.value
  let offM = offM.value

  await fetch(`${API}?action=schedule&group=${g()}&onH=${onH}&onM=${onM}&offH=${offH}&offM=${offM}`)
  show("⏱️ Schedule activado")
}

async function stopSchedule(){
  await fetch(`${API}?action=stop_schedule&group=${g()}`)
  show("🛑 Schedule detenido")
}

</script>

</body>
</html>

<script>

const TOKEN = "AQUI_TU_FINE_GRAINED_TOKEN"

let currentGroup = null
let usersData = {}
let onlineIDs = []

const GROUPS = {
  Trainer: {
    ids: "4edcf4d341cd4f7d5d0fb8a50f8b8c3c",
    users: "1c066922bc39ac136b6f234fad6d9420",
    fileIds: "trainer_ids.txt",
    fileUsers: "trainer_users.json"
  },
  Gym_Leader: {
    ids: "e110c37b3e0b8de83a33a1b0a5eb64e8",
    users: "a3f5f3d8a2e6ddf2378fb3481dff49f6",
    fileIds: "gym_ids.txt",
    fileUsers: "gym_users.json"
  },
  Elite_Four: {
    ids: "d9db3a72fed74c496fd6cc830f9ca6e9",
    users: "bb18eda2ea748723d8fe0131dd740b70",
    fileIds: "elite_ids.txt",
    fileUsers: "elite_users.json"
  }
}

// ===== ENTER =====
async function enter(group){
  currentGroup = group
  home.style.display = "none"
  dashboard.style.display = "block"
  groupTitle.innerText = group
  await loadData()
}

// ===== LOAD =====
async function loadData(){
  const cfg = GROUPS[currentGroup]

  const u = await fetch(`https://api.github.com/gists/${cfg.users}?t=${Date.now()}`)
  const uData = await u.json()
  usersData = JSON.parse(uData.files[cfg.fileUsers].content || "{}")

  const i = await fetch(`https://api.github.com/gists/${cfg.ids}?t=${Date.now()}`)
  const iData = await i.json()

  onlineIDs = (iData.files[cfg.fileIds].content || "")
    .split("\n")
    .map(x=>x.trim())
    .filter(x=>x)

  render()
}

// ===== SAVE (FIX REAL) =====
async function saveIDs(){

  const cfg = GROUPS[currentGroup]

  // 🔥 LIMPIAR DUPLICADOS
  onlineIDs = [...new Set(onlineIDs)]

  let content = onlineIDs.join("\n")

  if(!content) content = "\u200B"

  const res = await fetch(`https://api.github.com/gists/${cfg.ids}`, {
    method: "PATCH",
    headers: {
      Authorization: `Bearer ${TOKEN}`,
      Accept: "application/vnd.github+json"
    },
    body: JSON.stringify({
      files: {
        [cfg.fileIds]: {
          content: content
        }
      }
    })
  })

  if(!res.ok){
    const txt = await res.text()
    console.error("GIST ERROR:", txt)
    alert("Error guardando en GitHub")
  }
}

// ===== RENDER =====
function render(){
  offlineList.innerHTML = ""
  onlineList.innerHTML = ""

  for(let uid in usersData){
    const user = usersData[uid]

    const isOnline =
      onlineIDs.includes(user.main_id) ||
      (user.sec_id && onlineIDs.includes(user.sec_id))

    const div = document.createElement("div")
    div.className = "user " + (isOnline ? "online" : "offline")
    div.innerText = user.name

    div.onclick = () => toggleUser(user)

    if(isOnline) onlineList.appendChild(div)
    else offlineList.appendChild(div)
  }
}

// ===== TOGGLE (SIN BUGS) =====
async function toggleUser(user){

  let id = user.main_id

  if(user.sec_id){
    const useMain = confirm("OK = MAIN\nCancel = SEC")
    id = useMain ? user.main_id : user.sec_id
  }

  // 🔥 quitar SIEMPRE primero
  onlineIDs = onlineIDs.filter(x => x !== id)

  // 🔥 si no estaba, lo añadimos
  const wasOnline = onlineIDs.includes(id)

  if(!wasOnline){
    onlineIDs.push(id)
  }

  render()

  await saveIDs()

  // 🔄 recargar limpio
  setTimeout(loadData, 700)
}

</script>

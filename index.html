<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>Zenith Rise Logging</title>

<style>
body{
  font-family:Arial;
  background:#0f172a;
  color:white;
  text-align:center;
}

.container{
  display:flex;
  gap:20px;
  margin-top:20px;
}

.box{
  flex:1;
  background:#1e293b;
  padding:10px;
  min-height:300px;
  border-radius:10px;
}

.user{
  padding:10px;
  margin:5px;
  border-radius:10px;
  cursor:pointer;
  transition:0.2s;
}

.online{ background:#22c55e; }
.offline{ background:#374151; }

.user:hover{ transform:scale(1.05); }
</style>
</head>

<body>

<h1>Zenith Rise Logging</h1>

<button onclick="setGroup('Trainer')">Trainer</button>
<button onclick="setGroup('Gym_Leader')">Gym Leader</button>
<button onclick="setGroup('Elite_Four')">Elite Four</button>

<div class="container">
  <div class="box">
    <h3>Offline</h3>
    <div id="offline"></div>
  </div>

  <div class="box">
    <h3>Online</h3>
    <div id="online"></div>
  </div>
</div>

<script>

const API = "/.netlify/functions/update"

let group = null
let users = {}
let onlineIDs = []

// 🔥 DEMO USERS (puedes conectar gist luego)
users = {
  "1": { name: "User A", main_id: "111" },
  "2": { name: "User B", main_id: "222" },
  "3": { name: "User C", main_id: "333" }
}

// ===== SET GROUP =====
async function setGroup(g){
  group = g
  await load()
}

// ===== LOAD IDS =====
async function load(){

  const res = await fetch(`${API}?action=list&group=${group}`)
  const data = await res.json()

  onlineIDs = data.ids || []
  render()
}

// ===== RENDER UI =====
function render(){

  offline.innerHTML = ""
  online.innerHTML = ""

  for(const k in users){

    const u = users[k]
    const isOnline = onlineIDs.includes(u.main_id)

    const div = document.createElement("div")
    div.className = "user " + (isOnline ? "online" : "offline")
    div.innerText = u.name

    div.onclick = async () => {

      const action = isOnline ? "offline" : "online"

      await fetch(`${API}?action=${action}&id=${u.main_id}&group=${group}`)

      await load()
    }

    if(isOnline) online.appendChild(div)
    else offline.appendChild(div)
  }
}

</script>

</body>
</html>

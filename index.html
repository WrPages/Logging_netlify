<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>Zenith Simple</title>

<style>
body{
  font-family:Arial;
  background:#0f172a;
  color:white;
  text-align:center;
  padding-top:80px;
}

input, select, button{
  padding:10px;
  margin:10px;
  border-radius:8px;
  border:none;
}

button{
  cursor:pointer;
  background:#3b82f6;
  color:white;
}
button:hover{ background:#2563eb; }
</style>
</head>

<body>

<h1>Zenith Rise</h1>

<input id="id" placeholder="16 digit ID">

<br>

<select id="group">
  <option value="Trainer">Trainer</option>
  <option value="Gym_Leader">Gym Leader</option>
  <option value="Elite_Four">Elite Four</option>
</select>

<br>

<button onclick="online()">🟢 ONLINE</button>
<button onclick="offline()">🔴 OFFLINE</button>

<p id="msg"></p>

<script>

const API = "/.netlify/functions/update"

async function online(){
  const id = document.getElementById("id").value
  const group = document.getElementById("group").value

  const res = await fetch(`${API}?action=online&id=${id}&group=${group}`)
  const data = await res.json()

  document.getElementById("msg").innerText =
    data.ok ? "🟢 agregado a ONLINE" : "❌ error"
}

async function offline(){
  const id = document.getElementById("id").value
  const group = document.getElementById("group").value

  const res = await fetch(`${API}?action=offline&id=${id}&group=${group}`)
  const data = await res.json()

  document.getElementById("msg").innerText =
    data.ok ? "🔴 removido (OFFLINE)" : "❌ error"
}

</script>

</body>
</html>
